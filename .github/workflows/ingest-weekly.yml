# Runs every Sunday at 7 AM UTC (1 AM CT / 2 AM ET)
# Ingests slower-changing data: members, committees, campaign finance.
# Also regenerates AI delegation briefs after all data is fresh.

name: Weekly data ingestion

on:
  schedule:
    # Every Sunday at 7:00 AM UTC
    - cron: "0 7 * * 0"

  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Ingest members
        run: npx tsx scripts/ingest/members.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ingest committees
        run: npx tsx scripts/ingest/committees.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Ingest campaign finance
        run: npx tsx scripts/ingest/finance.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}

      - name: Ingest press releases
        run: npx tsx scripts/ingest/press-releases.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate delegation briefs
        run: npx tsx scripts/ingest/generate-briefs.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate events feed
        run: npx tsx scripts/ingest/generate-events.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
